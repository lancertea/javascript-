<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>手写bind函数</title>

</head>

<body>
    <script>
        // bind()、call()、apply()方法在Function.prototype上
        // 写法1：
        Function.prototype.myBind = function (thisArg, ...args) {
            if (typeof this !== 'function') {
                throw new TypeError('not function')
            }
            const fn = this
            thisArg = (thisArg !== undefined) && (thisArg !== null) ? Object(thisArg) : window

            return function(...props){
                const key = Symbol('fn')
                thisArg[key] = fn
                const res = thisArg[key](...args,...props)
                delete thisArg[key]
                return res
            }

        }
        function fn1(a, b, c) {
            console.log('this', this)
            console.log(a, b, c)
            return 'this is fn1'
        }

        const fn2 = fn1.myBind({
            x: 100
        }, 10, 20, 30)
        const res = fn2()
        console.log(res)
    </script>
</body>

</html>
