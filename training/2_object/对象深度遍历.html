<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对象深度遍历</title>
</head>

<body>
    <script>
        const entry = {
            a: {
                b: {
                    c: {
                        dd: 'abcdd',
                    },
                },
                d: {
                    xx: 'adxx',
                },
                e: 'ae',
            },
        };

        // 要求转换成如下对象
        const output = {
            'a.b.c.dd': 'abcdd',
            'a.d.xx': 'adxx',
            'a.e': 'ae',
        };

        function flatObj(obj, parentKey = "", result = {}) {
            for (const key in obj) {
                if (obj.hasOwnProperty(key)) {
                    let keyName = `${parentKey}${key}`;
                    if (typeof obj[key] === 'object')
                        flatObj(obj[key], keyName + ".", result)
                    else
                        result[keyName] = obj[key];
                }
            }
            return result;
        }

        function flatO(obj, parentKey = '', res = {}) {
            for (const [k, v] of Object.entries(obj)) {
                // 拼接当前的 key，如果 parentKey 存在就加个点，否则直接是 k
                let key = parentKey ? `${parentKey}.${k}` : k;

                // 坑点修复：判断是不是纯对象。
                // 必须满足：是对象类型，且不是 null，且不是数组（通常拍平不需要处理数组内部）
                if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
                    flatO(v, key, res); // 注意这里直接传 key 即可，点号已经在上面拼好了
                } else {
                    res[key] = v;
                }
            }
            return res;
        }

        const buildObj = obj => {
            const res = {};
            for (const [k, v] of Object.entries(obj)) {
                const keyArr = k.split('.');
                keyArr.reduce((pre, next, index, array) => {
                    if (index === array.length - 1) {
                        pre[next] = v;
                        return;
                    }
                    pre[next] = pre[next] || {};
                    return pre[next];
                }, res);
            }
            return res;
        };

        console.log(flatObj(entry));
        console.log(flatO(entry));
        console.log(buildObj(output));
    </script>
</body>

</html>
